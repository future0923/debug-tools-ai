interface:
  display_name: "DebugTools Hotswap"
  short_description: "Start run configs with DebugTools Hotswap"
  brand_color: "#2563EB"
  default_prompt: "Use $debug-tools-hotswap to start this run configuration with DebugTools Hotswap."

dependencies:
  tools:
    - type: "mcp"
      value: "debug-tools"
      description: "DebugTools IntelliJ MCP tools for listing run configurations and starting them with DebugTools Hotswap."

policy:
  allow_implicit_invocation: true
